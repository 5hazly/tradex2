# =============================================================================
# TradeAI Pro - Grafana Dashboard Provisioning
# =============================================================================

apiVersion: 1

providers:
  - name: 'TradeAI Pro Dashboards'
    orgId: 1
    folder: 'TradeAI'
    folderUid: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 60
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
